<!doctype html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Altered Ownership</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://www.beta.altered-reunion.com/assets/font/alteredicons.css">
    <link rel="stylesheet" href="https://www.beta.altered-reunion.com/themes/azure/style.css">

    <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
    <header class="az-site-header site-header">
        <div class="az-topbar">
            <div class="az-topbar-inner">
                <a class="az-brand" href="https://www.beta.altered-reunion.com/" title="Altered Re:Union">
                    <img src="https://www.beta.altered-reunion.com/uploads/logo/20260513_155720_4f49c889.png" alt="Altered Re:Union" class="navbar-logo-custom">
                    <span class="az-brand-name">Altered Re:Union</span>
                </a>

                <button type="button" data-sidebar-toggle="" class="nav-link" title="Menu">
                    <i class="fa-solid fa-bars-staggered"></i>
                </button>

                <div class="az-topbar-controls">
                    <button id="header-theme-toggle" class="btn-theme-toggle-ac" data-label-dark="Mode sombre" data-label-light="Mode clair" aria-label="Toggle dark mode" title="Mode sombre">
                        <i class="fa-solid fa-moon"></i>
                    </button>

                    <div class="dropdown dropdown-lang" style="display:flex;align-items:center">
                        <button class="btn-theme-toggle-ac" type="button" data-bs-toggle="dropdown" aria-expanded="false" id="ao-lang-toggle" style="line-height:1;display:inline-flex;align-items:center">
                            <span data-lang-current>🇫🇷</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end" style="min-width:auto">
                            <li><a class="dropdown-item" href="#" data-lang="en" title="English">🇬🇧</a></li>
                            <li><a class="dropdown-item active" href="#" data-lang="fr" title="Français">🇫🇷</a></li>
                            <li><a class="dropdown-item" href="#" data-lang="es" title="Español">🇪🇸</a></li>
                            <li><a class="dropdown-item" href="#" data-lang="it" title="Italiano">🇮🇹</a></li>
                            <li><a class="dropdown-item" href="#" data-lang="de" title="Deutsch">🇩🇪</a></li>
                        </ul>
                    </div>

                    <div id="ao-auth-control"></div>
                </div>
            </div>
        </div>

        <div class="az-navband" id="azNav">
            <div class="az-navband-inner">
                <ul class="navbar-nav az-nav-list d-flex flex-row">
                    <li class="nav-item">
                        <a href="https://www.beta.altered-reunion.com/pages/index" class="nav-link">
                            <i class="fa-solid fa-house"></i><span>Accueil</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="https://www.beta.altered-reunion.com/pages/news" class="nav-link">
                            <i class="fa-solid fa-newspaper"></i><span>Actualités</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="https://www.beta.altered-reunion.com/pages/cards" class="nav-link">
                            <i class="fa-solid fa-layer-group"></i><span>Cartes</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="https://www.beta.altered-reunion.com/pages/decks" class="nav-link">
                            <i class="fa-solid fa-table-list"></i><span>Decks</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/" class="nav-link active">
                            <i class="fa-solid fa-box-archive"></i><span>Collection</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="https://boardgamearena.com/gamepanel?game=altered" class="nav-link" target="_blank" rel="noopener noreferrer">
                            <i class="fa-solid fa-dice"></i><span>Jouer</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </header>

    <main id="ao-main" class="container py-4">
        <h1>Ma Collection</h1>
        <p class="text-body-secondary">Bienvenue sur Altered Ownership.</p>

        <section id="ao-import" class="card mt-4" hidden>
            <div class="card-body">
                <h2 class="h5 card-title">Importer un export Equinox</h2>
                <p class="card-text text-body-secondary small mb-3">
                    Sélectionnez le fichier <code>collection.csv</code> exporté depuis Equinox.
                </p>
                <form id="ao-import-form" class="d-flex flex-column flex-sm-row gap-2 align-items-stretch align-items-sm-center">
                    <input id="ao-import-file" type="file" name="file" accept=".csv,text/csv" required class="form-control" />
                    <button id="ao-import-submit" type="submit" class="btn btn-primary">
                        <i class="fa-solid fa-upload me-1"></i>Importer
                    </button>
                </form>
                <div id="ao-import-status" class="mt-3" role="status" aria-live="polite"></div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js" defer></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Altered Ownership</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="/config.js"></script>
    <script src="/js/bootstrap.js"></script>

    <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
    <header class="ao-header">
        <div class="ao-header-inner">
            <a class="ao-brand" href="/" title="Altered Ownership">
                <img src="/img/logo.png" alt="Altered Ownership" class="ao-logo">
                <span class="ao-brand-name">Altered Ownership</span>
            </a>

            <div class="ao-header-controls">
                <a class="ao-back-link" data-cfg-href="{reunionWebBase}/">
                    <i class="fa-solid fa-arrow-left"></i><span data-i18n="nav.back">Back to altered.re</span>
                </a>

                <div id="ao-auth-control"></div>
            </div>
        </div>
    </header>

    <main id="ao-main" class="container py-4">
        <h1 class="h3 mb-4" data-i18n="main.title">Collection importer</h1>

        <h2 class="h5 mt-4" data-i18n="section.why.title">What for?</h2>
        <div data-i18n-html="section.why.body"></div>
        <hr class="my-4" />

        <h2 class="h5 mt-4" data-i18n="section.export.title">How do I export my current collection?</h2>
        <div data-i18n-html="section.export.body"></div>
        <hr class="my-4" />

        <h2 class="h5 mt-4" data-i18n="section.whatImported.title">What will be imported?</h2>
        <div data-i18n-html="section.whatImported.body"></div>
        <hr class="my-4" />

        <h2 class="h5 mt-4" data-i18n="section.terms.title">What are the terms?</h2>
        <div data-i18n-html="section.terms.body"></div>

        <section id="ao-import" class="card mt-4">
            <div class="card-body">
                <h2 class="h5 card-title" data-i18n="import.title">Import my collection</h2>

                <div id="ao-import-anon" hidden>
                    <a href="/api/auth/login?returnUrl=/" class="btn btn-primary">
                        <i class="fa-solid fa-user me-1"></i><span data-i18n="import.loginRegister">Log in / Sign up</span>
                    </a>
                </div>

                <div id="ao-import-auth" hidden>
                    <p class="card-text text-body-secondary small mb-3" data-i18n-html="import.description">
                        Import the <code>altered-personal-data-export.zip</code> file.
                    </p>
                    <form id="ao-import-form" class="d-flex flex-column gap-3">
                        <input id="ao-import-file" type="file" name="file" accept=".zip,application/zip" required class="form-control" />
                        <div class="form-check">
                            <input id="ao-import-terms" type="checkbox" class="form-check-input" />
                            <label for="ao-import-terms" class="form-check-label" data-i18n="import.termsAccept">I accept the terms above.</label>
                        </div>
                        <button id="ao-import-submit" type="submit" class="btn btn-primary align-self-start" disabled>
                            <i class="fa-solid fa-upload me-1"></i><span data-i18n="import.button">Import</span>
                        </button>
                    </form>
                </div>

                <div id="ao-import-status" class="mt-3" role="status" aria-live="polite"></div>
            </div>
        </section>

        <hr class="my-4 mt-5" />

        <h2 class="h5 mt-4" data-i18n="section.newCards.title">How can I get new cards?</h2>
        <div data-i18n-html="section.newCards.body"></div>
    </main>

    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/i18n.js" defer></script>
    <script src="/js/app.js" defer></script>
</body>
</html>
